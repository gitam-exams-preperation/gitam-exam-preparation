<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCACHqvv1EB6-Fd_xYhId488EI8SSSjHoQ",
  authDomain: "gitam-exam-preparation-3b83a.firebaseapp.com",
  projectId: "gitam-exam-preparation-3b83a",
  storageBucket: "gitam-exam-preparation-3b83a.firebasestorage.app",
  messagingSenderId: "202789647566",
  appId: "1:202789647566:web:3b50bf86bca712cb660c9f",
  measurementId: "G-Z7KR10Q3P2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTER ================= */
window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    // Store user data in Firestore
    await setDoc(doc(db, "users", userCred.user.uid), {
      email: email,
      role: "student",
      createdAt: new Date()
    });

    alert("Registration Successful!");
  } catch (error) {
    alert(error.message);
  }
};

/* ================= LOGIN ================= */
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    alert(error.message);
  }
};

/* ================= LOGOUT ================= */
window.logout = () => {
  signOut(auth);
};

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("userEmail").innerText = user.email;

    // Check role
    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists() && snap.data().role === "admin") {
      document.getElementById("adminPanel").style.display = "block";
    } else {
      document.getElementById("adminPanel").style.display = "none";
    }

  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
  }
});

</script>
