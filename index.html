<!DOCTYPE html>
<html>
<head>
<title>GITAM Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:380px;
height:600px;
background:rgba(255,255,255,0.08);
border-radius:25px;
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* CONTENT */
.content{
flex:1;
padding:25px;
overflow-y:auto;
text-align:center;
}

/* COURSE GRID */
.course-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.course{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.course:hover{
background:#00c6ff;
color:black;
}

/* PROFILE */
.profile-info{
margin-top:20px;
text-align:left;
}

.profile-info p{
margin:8px 0;
}

button{
width:100%;
padding:10px;
margin-top:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.logout{
background:#ff416c;
color:white;
}

/* NAV */
.nav{
height:60px;
background:rgba(0,0,0,0.3);
display:flex;
justify-content:space-around;
align-items:center;
}

.nav div{
cursor:pointer;
font-weight:bold;
}

/* HIDE */
#profile{
display:none;
}
</style>
</head>
<body>

<div class="card">

<!-- HOME -->
<div class="content" id="home">
<h2>GITAM Courses</h2>
<p id="userEmail"></p>

<div class="course-grid">
<div class="course" onclick="go('aiml.html')">CSE AIML</div>
<div class="course" onclick="go('ds.html')">CSE DS</div>
<div class="course" onclick="go('core.html')">CSE CORE</div>
<div class="course" onclick="go('cs.html')">CSE CS</div>
</div>

</div>

<!-- PROFILE -->
<div class="content" id="profile">
<h2>Profile</h2>

<div class="profile-info">
<p><b>Email:</b></p>
<p id="profileEmail"></p>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div>

<!-- NAVIGATION -->
<div class="nav">
<div onclick="showHome()">Home</div>
<div onclick="showProfile()">Profile</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCACHqvv1EB6-Fd_xYhId488EI8SSSjHoQ",
authDomain: "gitam-exam-preparation-3b83a.firebaseapp.com",
projectId: "gitam-exam-preparation-3b83a",
appId: "1:202789647566:web:3b50bf86bca712cb660c9f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,user=>{
if(user){
userEmail.innerText=user.email;
profileEmail.innerText=user.email;
}else{
window.location.href="login.html";
}
});

window.logout=()=>{
signOut(auth);
window.location.href="login.html";
}

window.go=(page)=>{
window.location.href=page;
}

window.showHome=()=>{
home.style.display="block";
profile.style.display="none";
}

window.showProfile=()=>{
home.style.display="none";
profile.style.display="block";
}

</script>

</body>
</html>
