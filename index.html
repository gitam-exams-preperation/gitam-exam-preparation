<!DOCTYPE html>
<html>
<head>
<title>GITAM Student Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

/* CARD */
.card{
width:380px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
text-align:center;
}

/* TITLE */
h2{
margin-bottom:20px;
font-weight:600;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:linear-gradient(to right,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* DASHBOARD */
#dashboard{
display:none;
}

/* COURSE GRID */
.course-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.course-card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.course-card:hover{
background:#00c6ff;
color:black;
}

.logout{
background:linear-gradient(to right,#ff416c,#ff4b2b);
margin-top:20px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="authBox">
<h2>🎓 GITAM Student Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard">
<h2>Welcome to GITAM Courses</h2>
<p id="userEmail"></p>

<div class="course-grid">
<div class="course-card" onclick="openCourse('aiml')">CSE AIML</div>
<div class="course-card" onclick="openCourse('ds')">CSE DS</div>
<div class="course-card" onclick="openCourse('core')">CSE CORE</div>
<div class="course-card" onclick="openCourse('cs')">CSE CS</div>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCACHqvv1EB6-Fd_xYhId488EI8SSSjHoQ",
authDomain: "gitam-exam-preparation-3b83a.firebaseapp.com",
projectId: "gitam-exam-preparation-3b83a",
storageBucket: "gitam-exam-preparation-3b83a.firebasestorage.app",
messagingSenderId: "202789647566",
appId: "1:202789647566:web:3b50bf86bca712cb660c9f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = async ()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
}catch(error){
alert(error.message);
}
}

/* LOGOUT */
window.logout = ()=>signOut(auth);

/* AUTH CHECK */
onAuthStateChanged(auth,(user)=>{
if(user){
authBox.style.display="none";
dashboard.style.display="block";
userEmail.innerText=user.email;
}else{
authBox.style.display="block";
dashboard.style.display="none";
}
});

/* OPEN COURSE */
window.openCourse = (course)=>{
window.location.href = course + ".html";
}

</script>

</body>
</html>
